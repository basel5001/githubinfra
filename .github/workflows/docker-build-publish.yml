name: Docker Build & Publish
on:
  workflow_call:
    inputs:
      image-name:
        description: Docker image name
        required: true
        type: string
      registry:
        description: Container registry
        required: false
        type: string
        default: ghcr.io
      platforms:
        description: Comma-separated platforms
        required: false
        type: string
        default: linux/amd64
      tags:
        description: Comma-separated tags
        required: false
        type: string
        default: latest
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      push-enabled:
        description: Push images to registry
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: inputs.push-enabled
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry == 'dockerhub' && '' || inputs.registry }}
          username: ${{ inputs.registry == 'dockerhub' && secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ inputs.registry == 'dockerhub' && secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry == 'ghcr.io' && format('ghcr.io/{0}/{1}', github.repository_owner, inputs.image-name) || inputs.image-name }}
          tags: ${{ inputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push-enabled }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
