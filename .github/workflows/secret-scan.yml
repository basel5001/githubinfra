name: Secret Scan
on:
  workflow_call:
    inputs:
      scanner:
        description: Scanner to use (gitleaks, trufflehog, both)
        required: false
        type: string
        default: gitleaks
      fail-on-detection:
        description: Whether to fail the pipeline on secrets found
        required: false
        type: boolean
        default: true
      scan-history:
        description: Scan full git history or only latest commit
        required: false
        type: boolean
        default: false

jobs:
  gitleaks:
    if: inputs.scanner == 'gitleaks' || inputs.scanner == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-history && 0 || 1 }}
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    if: inputs.scanner == 'trufflehog' || inputs.scanner == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-history && 0 || 1 }}
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified --fail
