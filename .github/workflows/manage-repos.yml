name: Manage Repos
on:
  push:
    branches: [main]
    paths:
      - repos.yml
      - management/**
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no changes applied)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: management

      - name: Diff (show changes)
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_MANAGEMENT_TOKEN }}
        run: npm run diff
        working-directory: management

      - name: Sync repos
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false)
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_MANAGEMENT_TOKEN }}
        run: npm run sync
        working-directory: management
