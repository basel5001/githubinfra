name: Docker Build
description: Build and optionally push Docker images with caching
inputs:
  image-name:
    description: Docker image name
    required: true
  registry:
    description: Container registry (ghcr, dockerhub)
    required: false
    default: ghcr.io
  push:
    description: Whether to push the image
    required: false
    default: "false"
  platforms:
    description: Comma-separated platforms to build for
    required: false
    default: linux/amd64
  tags:
    description: Comma-separated tags
    required: false
    default: latest
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: Dockerfile
  build-args:
    description: Build arguments
    required: false
    default: ""
outputs:
  image-digest:
    description: Digest of the built image
    value: ${{ steps.build-push.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: inputs.push == 'true' && inputs.registry == 'ghcr.io'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: inputs.push == 'true' && inputs.registry == 'dockerhub'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image-name }}
        tags: ${{ inputs.tags }}

    - name: Build and push
      id: build-push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: ${{ inputs.build-args }}
