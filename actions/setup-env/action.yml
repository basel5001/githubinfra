name: Setup Environment
description: Setup language environment with caching
inputs:
  language:
    description: Language to setup (python, node, go)
    required: true
  python-version:
    description: Python version
    required: false
    default: "3.11"
  node-version:
    description: Node version
    required: false
    default: "20"
  go-version:
    description: Go version
    required: false
    default: "1.22"
  install-deps:
    description: Whether to install dependencies
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Python
      if: inputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - name: Setup Node.js
      if: inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
    - name: Setup Go
      if: inputs.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Install Python deps
      if: inputs.language == 'python' && inputs.install-deps == 'true'
      shell: bash
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi
    - name: Install Node deps
      if: inputs.language == 'node' && inputs.install-deps == 'true'
      shell: bash
      run: npm ci
    - name: Install Go deps
      if: inputs.language == 'go' && inputs.install-deps == 'true'
      shell: bash
      run: go mod download
